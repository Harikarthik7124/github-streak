name: Daily Commit

on:
  schedule:
    - cron: '45 11 * * *'   # 5:15 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily log
        run: |
          mkdir -p logs
          echo "Commit on $(date -u +"%Y-%m-%d %H:%M UTC")" >> logs/daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add logs/daily-log.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily automated commit"

      - name: Push changes
        run: git push
